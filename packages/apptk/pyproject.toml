[project]
name = "apptk"
requires-python = ">=3.10"
dynamic = ["version"]
dependencies = [
    "prompt-toolkit==3.0.52",
    "flatlatex>=0.15",
    "fsspec[http]>=2026.2.0",
    "imagesize>=1.4.1",
    "linkify-it-py>=2.0.3",
    "markdown-it-py>=4.0.0",
    "mdit-py-plugins>=0.5.0",
    "modshim>=0.5.0",
    "pillow>=12.1.1",
    "pyperclip>=1.11.0",
    "sixelcrop>=0.1.9",
    "timg>=1.1.6",
    "universal-pathlib>=0.3.10",
    "pygments>=2.19.2",
]

[tool.uv.sources]
euporie-core = { workspace = true }

[tool.hatch.version]
path = "../../VERSION"
pattern = "(?P<version>.+)"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
