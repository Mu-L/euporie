[project]
name = "euporie-hub"
requires-python = ">=3.10"
dynamic = ["version"]
dependencies = [
    "asyncssh>=2.22.0",
    "euporie-core",
]

[project.urls]
Documentation = "https://euporie.readthedocs.io/en/latest"
Issues = "https://github.com/joouha/euporie/issues"
Source = "https://github.com/joouha/euporie"
Changelog = "https://euporie.readthedocs.io/en/latest/pages/changelog.html"

[tool.uv.sources]
euporie-core = { workspace = true }

[tool.hatch.version]
path = "../../VERSION"
pattern = "(?P<version>.+)"

[tool.hatch.build.targets.wheel]
packages = ["src/euporie"]

[project.scripts]
euporie-hub = "euporie.hub.app:HubApp.launch"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
