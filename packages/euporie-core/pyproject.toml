[project]
name = "euporie-core"
requires-python = ">=3.10"
dynamic = ["version"]
dependencies = [
    "apptk",
    "fastjsonschema>=2.21.2",
    "jupyter-client>=8.8.0",
    "jupytest>=3.0.0",
    "nbformat>=5.10.4",
    "platformdirs>=4.9.2",
    "pyperclip>=1.11.0",
    "python-code-minimap>=0.1.1",
]

[project.urls]
Documentation = "https://euporie.readthedocs.io/en/latest"
Issues = "https://github.com/joouha/euporie/issues"
Source = "https://github.com/joouha/euporie"
Changelog = "https://euporie.readthedocs.io/en/latest/pages/changelog.html"


[tool.uv.sources]
apptk = { workspace = true }

[tool.hatch.version]
path = "../../VERSION"
pattern = "(?P<version>.+)"

[tool.hatch.build.targets.wheel]
packages = ["src/euporie"]

[project.scripts]
euporie = "euporie.core.app.launch:LaunchApp.launch"

[project.entry-points."pygments.lexers"]
argparse = 'euporie.core.pygments:ArgparseLexer'

[project.entry-points."pygments.styles"]
euporie = 'euporie.core.pygments:EuporiePygmentsStyle'

[project.entry-points."jupyter_client.kernel_provisioners"]
logging-local-provisioner = "euporie.core.kernel.jupyter_manager:LoggingLocalProvisioner"

[project.entry-points."universal_pathlib.implementations"]
untitled = "euporie.core.path:UntitledPath"

[project.entry-points."fsspec.specs"]
http = "euporie.core.fsspec:HTTPFileSystem"
https = "euporie.core.fsspec:HTTPFileSystem"
untitled = "fsspec.implementations.memory:MemoryFileSystem"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
