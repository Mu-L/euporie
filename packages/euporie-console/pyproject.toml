[project]
name = "euporie-console"
requires-python = ">=3.10"
version = "3.0.0-dev"
dependencies = [
    "euporie-core",
]


[project.urls]
Documentation = "https://euporie.readthedocs.io/en/latest"
Issues = "https://github.com/joouha/euporie/issues"
Source = "https://github.com/joouha/euporie"
Changelog = "https://euporie.readthedocs.io/en/latest/pages/changelog.html"

[tool.uv.sources]
euporie-core = { workspace = true }

[project.scripts]
euporie-console = "euporie.console.app:ConsoleApp.launch"

[tool.uv.build-backend]
module-name = "euporie.console"

[build-system]
requires = ["uv_build>=0.10.4,<0.11.0"]
build-backend = "uv_build"

